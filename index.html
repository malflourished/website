<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Timeline</title>
</head>
<body>
  <!-- Three.js canvas injected here -->
  <canvas id="bg-canvas"></canvas>

  <!-- Noise / grain overlay -->
  <div class="grain-overlay" aria-hidden="true"></div>

  <div id="app">
    <header class="hero">
      <p class="hero__label">Case File #2019</p>
      <h1 class="hero__title">Memory<br />Timeline</h1>
      <p class="hero__sub">Select a node to inspect.</p>
    </header>

    <main class="timeline-container">
      <div class="timeline" role="list" id="timeline"></div>
      <aside class="inspector" id="inspector" aria-live="polite">
        <div class="inspector__empty">
          <p>No memory selected.</p>
        </div>
      </aside>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
